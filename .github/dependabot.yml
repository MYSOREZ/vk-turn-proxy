version: 2
updates:
  - package-ecosystem: "gomod" # Проверка Go библиотек
    directory: "/"
    schedule:
      interval: "weekly" # Раз в неделю
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions" # Проверка версий экшенов
    directory: "/"
    schedule:
      interval: "monthly"
